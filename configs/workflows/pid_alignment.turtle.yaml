pid_alignment_workflow:
  # Runtime target:
  # - turtle: publish normal workflow topics and bridge /cmd_vel to turtlesim.
  # - robot: publish normal workflow topics and send Float32MultiArray commands to cmd_topic.
  environment: turtle

  # First phase to enter when this unified workflow node starts.
  start_phase: STATUS_ALIGN

  # Ordered mission/action phases for this run.
  # Shorten the same sequence for partial tests, e.g. [STATUS_ALIGN].
  # Use [STATUS_ALIGN, FORWARD_APPROACH, BASE_COORD] for a longer robot flow.
  phase_sequence: [STATUS_ALIGN]

  detector:
    # BaseDetect SDK config path, relative to the RobotFetch project root unless absolute.
    sdk_config: BaseDetect/configs/basedetect_sdk.yaml

    # BaseDetect profile used for status-target detection during STATUS_ALIGN.
    status_profile: status_competition

    # BaseDetect profile used for 3D target output during BASE_COORD.
    base_coord_profile: base_coord_competition

    # OpenCV input source. "0" means camera index 0; a video file path can be used for replay.
    input_source: "0"

    # Ordered fallback capture modes used when default OpenCV capture opens but frame reads fail.
    # Reorder these entries when the model is sensitive to camera resolution/FPS.
    camera_fallbacks:
      - backend: v4l2
        fourcc: MJPG
        width: 640
        height: 360
        fps: 270.0
      - backend: v4l2
        fourcc: MJPG
        width: 800
        height: 600
        fps: 190.0
      - backend: v4l2
        fourcc: MJPG
        width: 1024
        height: 768
        fps: 190.0

  topics:
    # Workflow velocity command. In turtle mode this is also bridged to adapter.turtle_cmd_topic.
    cmd_topic: /cmd_vel
    publish_cmd_vel: true

    # Current workflow phase as std_msgs/String, e.g. STATUS_ALIGN.
    workflow_phase_topic: /workflow/phase

    # Algorithm state as std_msgs/String, e.g. RUNNING, ALIGNED, TARGET_LOST, ERROR.
    algo_status_topic: /workflow/algo_status

    # Environment/adapter state as std_msgs/String, e.g. READY or RUNNING.
    env_status_topic: /workflow/env_status

    # Selected status target pixel output. point.x carries the selected target cx.
    selected_status_topic: /robot_fetch/selected_target_px

  adapter:
    # turtlesim command topic. Used only when environment is turtle.
    # Set to null for robot configs.
    turtle_cmd_topic: /turtle1/cmd_vel
    # Final command sign adapter.
    # Applies globally before publishing robot commands or turtle bridge output.
    cmd_vel_transform:
      invert_linear_x: false
      invert_linear_y: false
      invert_angular_z: false

  status_align:
    # Desired image x-coordinate for alignment, in pixels.
    target_x: 320.0

    # Alignment succeeds when abs(target_x - selected_cx) is within this many pixels.
    tolerance_px: 8.0

    # PID output limit for the workflow velocity command.
    max_speed: 0.25

  forward_approach:
    # Open-loop forward speed after STATUS_ALIGN succeeds.
    speed_mps: 0.12

    # Fixed forward distance. Runtime duration is distance_m / speed_mps.
    distance_m: 0.3

  base_coord:
    # PointStamped output for base-coordinate targets during BASE_COORD.
    publish_topic: /robot_fetch/base_coord_targets
    frame_id: camera_link
    complete_on_first_target: true
